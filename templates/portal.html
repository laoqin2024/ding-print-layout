{% extends "base.html" %}

{% block title %}打印门户{% endblock %}

{% block body %}
  <div class="p-4 pb-10">
    <div class="max-w-md mx-auto">
      <header class="pt-7 pb-5 px-1">
        <div class="flex justify-between items-start mb-3">
          <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-2xl glass flex items-center justify-center">
              <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            </div>
            <h1 class="text-2xl font-black tracking-tight">打印门户</h1>
          </div>
          <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse mt-2"></div>
        </div>
        <div class="flex items-center justify-between gap-2">
          <p id="status-text" class="text-slate-500 dark:text-slate-400 text-[11px] font-medium">正在校验身份...</p>
          <div id="user-info" class="hidden text-[10px] text-slate-600 dark:text-slate-400 font-black"></div>
        </div>
      </header>

      <!-- Skeleton -->
      <div id="loading-state" class="space-y-4">
        <div class="glass rounded-3xl p-5">
          <div class="flex justify-between items-center">
            <div class="h-5 w-24 rounded-full skeleton"></div>
            <div class="h-5 w-16 rounded-full skeleton opacity-70"></div>
          </div>
          <div class="mt-4 h-5 w-4/5 rounded-lg skeleton"></div>
          <div class="mt-2 h-3 w-2/5 rounded-lg skeleton opacity-80"></div>
          <div class="mt-5 h-11 rounded-2xl skeleton"></div>
        </div>
        <div class="glass rounded-3xl p-5 opacity-70">
          <div class="flex justify-between items-center">
            <div class="h-5 w-20 rounded-full skeleton"></div>
            <div class="h-5 w-12 rounded-full skeleton"></div>
          </div>
          <div class="mt-4 h-5 w-3/4 rounded-lg skeleton"></div>
          <div class="mt-2 h-3 w-1/2 rounded-lg skeleton opacity-80"></div>
          <div class="mt-5 h-11 rounded-2xl skeleton"></div>
        </div>
      </div>

      <section id="toolbar" class="hidden mb-4">
        <div class="glass rounded-3xl p-4 space-y-3">
          <div class="grid grid-cols-4 gap-2 text-center">
            <div class="rounded-2xl bg-white/30 dark:bg-white/5 py-2">
              <div id="stat-all" class="text-sm font-black">0</div>
              <div class="text-[10px] text-slate-500 dark:text-slate-400">总数</div>
            </div>
            <div class="rounded-2xl bg-amber-500/10 py-2">
              <div id="stat-pending" class="text-sm font-black text-amber-700 dark:text-amber-300">0</div>
              <div class="text-[10px] text-slate-500 dark:text-slate-400">审批中</div>
            </div>
            <div class="rounded-2xl bg-emerald-500/10 py-2">
              <div id="stat-pass" class="text-sm font-black text-emerald-700 dark:text-emerald-300">0</div>
              <div class="text-[10px] text-slate-500 dark:text-slate-400">已通过</div>
            </div>
            <div class="rounded-2xl bg-slate-500/10 py-2">
              <div id="stat-other" class="text-sm font-black text-slate-700 dark:text-slate-300">0</div>
              <div class="text-[10px] text-slate-500 dark:text-slate-400">其他</div>
            </div>
          </div>

          <div class="flex gap-2">
            <input id="search-input" type="search" placeholder="搜索标题/编号"
              class="flex-1 glass rounded-2xl px-3 py-2.5 text-sm outline-none focus:ring-2 ring-blue-500/60">
            <select id="sort-select"
              class="glass rounded-2xl px-3 py-2.5 text-xs font-black outline-none">
              <option value="desc">最新优先</option>
              <option value="asc">最早优先</option>
            </select>
          </div>

          <div>
            <label class="text-[10px] font-black text-slate-600 dark:text-slate-400 mb-1.5 block">流程模板筛选</label>
            <select id="template-select"
              class="w-full glass rounded-2xl px-3 py-2.5 text-xs font-black outline-none">
              <option value="">全部流程模板</option>
            </select>
          </div>

          <div>
            <label class="text-[10px] font-black text-slate-600 dark:text-slate-400 mb-1.5 block">审批状态筛选</label>
            <div id="status-tabs" class="flex flex-wrap gap-2">
              <button data-status="all" class="status-tab glass rounded-full px-3 py-1.5 text-[11px] font-black">全部</button>
              <button data-status="pending" class="status-tab glass rounded-full px-3 py-1.5 text-[11px] font-black">审批中</button>
              <button data-status="pass" class="status-tab glass rounded-full px-3 py-1.5 text-[11px] font-black">已通过</button>
              <button data-status="reject" class="status-tab glass rounded-full px-3 py-1.5 text-[11px] font-black">已拒绝</button>
              <button data-status="revoke" class="status-tab glass rounded-full px-3 py-1.5 text-[11px] font-black">已撤回</button>
            </div>
          </div>
        </div>
      </section>

      <div id="list-container" class="hidden grid gap-4"></div>
      <div id="load-more-wrap" class="hidden mt-4 text-center">
        <button id="load-more-btn" class="glass rounded-full px-5 py-2.5 text-xs font-black">
          加载更多
        </button>
      </div>

      <div id="empty-state" class="hidden mt-10 text-center px-4">
        <div class="glass rounded-3xl py-14 px-6">
          <div class="mx-auto w-14 h-14 rounded-3xl glass flex items-center justify-center">
            <div class="w-6 h-6 rounded-xl bg-slate-300/70 dark:bg-slate-700/70"></div>
          </div>
          <h3 class="mt-5 text-slate-700 dark:text-slate-200 font-black text-base">暂无单据</h3>
          <p class="text-slate-500 dark:text-slate-400 text-[11px] mt-2 leading-relaxed">仅显示已配置坐标的审批流</p>
          <button id="refresh-btn" class="mt-6 text-xs font-black glass px-5 py-2.5 rounded-full active:scale-95 transition">
            刷新列表
          </button>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    window.PORTAL_BOOT = { corpId: "{{ corp_id }}" };
  </script>
  <script src="{{ url_for('static', filename='dist-legacy/portal.js') }}?v={{ asset_v }}"></script>
{% endblock %}
