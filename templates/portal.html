{% extends "base.html" %}

{% block title %}打印门户{% endblock %}

{% block body %}
  <div class="min-h-screen bg-slate-50 dark:bg-slate-900">
    <!-- PC 端宽屏布局 -->
    <div class="max-w-7xl mx-auto p-6">
      <!-- 顶部导航栏 -->
      <header class="mb-8">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl glass flex items-center justify-center">
              <div class="w-3 h-3 rounded-full bg-blue-500"></div>
            </div>
            <div>
              <h1 class="text-3xl font-black tracking-tight">打印门户</h1>
              <p id="status-text" class="text-slate-500 dark:text-slate-400 text-sm mt-1">正在加载...</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div id="user-info" class="hidden glass rounded-2xl px-4 py-2">
              <div class="text-xs text-slate-600 dark:text-slate-400">
                <span class="font-black" id="user-name"></span>
                <span class="mx-2">·</span>
                <span id="user-dept"></span>
              </div>
            </div>
            <div id="status-dot" class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></div>
          </div>
        </div>
      </header>

      <!-- 模板卡片视图 -->
      <div id="templates-view" class="hidden">
        <div class="mb-6">
          <div class="flex items-center justify-between">
            <div>
              <h2 class="text-xl font-black text-slate-800 dark:text-slate-200">选择打印模板</h2>
              <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">
                已配置 <span id="template-count" class="font-black text-blue-600">0</span> 个打印模板
              </p>
            </div>
            <button id="refresh-templates-btn" class="glass rounded-2xl px-4 py-2 text-sm font-black hover:shadow-lg transition-all">
              <svg class="w-4 h-4 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
              </svg>
              刷新
            </button>
          </div>
        </div>

        <!-- 模板卡片网格 (PC 端固定 3 列) -->
        <div id="templates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- 卡片将通过 JS 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div id="templates-empty" class="hidden mt-20 text-center">
          <div class="glass rounded-3xl py-20 px-6 max-w-md mx-auto">
            <div class="mx-auto w-16 h-16 rounded-3xl glass flex items-center justify-center">
              <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <h3 class="mt-6 text-slate-700 dark:text-slate-200 font-black text-lg">暂无打印模板</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">请联系管理员配置打印模板</p>
          </div>
        </div>
      </div>

      <!-- 审批列表视图 -->
      <div id="instances-view" class="hidden">
        <!-- 返回按钮和标题 -->
        <div class="mb-6">
          <button id="back-to-templates-btn" class="glass rounded-2xl px-4 py-2 text-sm font-black hover:shadow-lg transition-all mb-4">
            <svg class="w-4 h-4 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            返回模板列表
          </button>
          <div class="flex items-center justify-between">
            <div>
              <h2 id="current-template-name" class="text-xl font-black text-slate-800 dark:text-slate-200"></h2>
              <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">
                已加载 <span id="instance-count" class="font-black text-blue-600">0</span> 条
              </p>
            </div>
          </div>
        </div>

        <!-- 工具栏 -->
        <section id="toolbar" class="mb-6">
          <div class="glass rounded-3xl p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <!-- 搜索和排序 -->
              <div class="flex gap-3">
                <input id="search-input" type="search" placeholder="搜索标题/编号"
                  class="flex-1 glass rounded-2xl px-4 py-3 text-sm outline-none focus:ring-2 ring-blue-500/60">
                <select id="sort-select"
                  class="glass rounded-2xl px-4 py-3 text-sm font-black outline-none">
                  <option value="desc">最新优先</option>
                  <option value="asc">最早优先</option>
                </select>
              </div>

              <!-- 状态筛选 -->
              <div id="status-tabs" class="flex flex-wrap gap-2">
                <button data-status="all" class="status-tab glass rounded-full px-4 py-2 text-sm font-black">全部</button>
                <button data-status="pending" class="status-tab glass rounded-full px-4 py-2 text-sm font-black">审批中</button>
                <button data-status="pass" class="status-tab glass rounded-full px-4 py-2 text-sm font-black">已通过</button>
                <button data-status="reject" class="status-tab glass rounded-full px-4 py-2 text-sm font-black">已拒绝</button>
                <button data-status="revoke" class="status-tab glass rounded-full px-4 py-2 text-sm font-black">已撤回</button>
              </div>
            </div>

            <!-- 统计信息 -->
            <div class="grid grid-cols-4 gap-4 mt-4">
              <div class="rounded-2xl bg-white/30 dark:bg-white/5 p-3 text-center">
                <div id="stat-all" class="text-lg font-black">0</div>
                <div class="text-xs text-slate-500 dark:text-slate-400">总数</div>
              </div>
              <div class="rounded-2xl bg-amber-500/10 p-3 text-center">
                <div id="stat-pending" class="text-lg font-black text-amber-700 dark:text-amber-300">0</div>
                <div class="text-xs text-slate-500 dark:text-slate-400">审批中</div>
              </div>
              <div class="rounded-2xl bg-emerald-500/10 p-3 text-center">
                <div id="stat-pass" class="text-lg font-black text-emerald-700 dark:text-emerald-300">0</div>
                <div class="text-xs text-slate-500 dark:text-slate-400">已通过</div>
              </div>
              <div class="rounded-2xl bg-slate-500/10 p-3 text-center">
                <div id="stat-other" class="text-lg font-black text-slate-700 dark:text-slate-300">0</div>
                <div class="text-xs text-slate-500 dark:text-slate-400">其他</div>
              </div>
            </div>
          </div>
        </section>

        <!-- 审批列表 -->
        <div id="list-container" class="grid gap-4"></div>

        <!-- 加载更多 -->
        <div id="load-more-wrap" class="hidden mt-6 text-center">
          <button id="load-more-btn" class="glass rounded-full px-6 py-3 text-sm font-black hover:shadow-lg transition-all">
            加载更多
          </button>
        </div>

        <!-- 空状态 -->
        <div id="instances-empty" class="hidden mt-20 text-center">
          <div class="glass rounded-3xl py-20 px-6 max-w-md mx-auto">
            <div class="mx-auto w-16 h-16 rounded-3xl glass flex items-center justify-center">
              <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <h3 class="mt-6 text-slate-700 dark:text-slate-200 font-black text-lg">暂无审批记录</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">该模板下还没有审批记录</p>
          </div>
        </div>
      </div>

      <!-- 加载骨架屏 (固定 3 列) -->
      <div id="loading-state" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="glass rounded-3xl p-6">
          <div class="h-12 w-12 rounded-2xl skeleton mb-4"></div>
          <div class="h-6 w-3/4 rounded-lg skeleton mb-2"></div>
          <div class="h-4 w-1/2 rounded-lg skeleton opacity-70"></div>
        </div>
        <div class="glass rounded-3xl p-6 opacity-70">
          <div class="h-12 w-12 rounded-2xl skeleton mb-4"></div>
          <div class="h-6 w-2/3 rounded-lg skeleton mb-2"></div>
          <div class="h-4 w-1/3 rounded-lg skeleton opacity-70"></div>
        </div>
        <div class="glass rounded-3xl p-6 opacity-50">
          <div class="h-12 w-12 rounded-2xl skeleton mb-4"></div>
          <div class="h-6 w-3/5 rounded-lg skeleton mb-2"></div>
          <div class="h-4 w-2/5 rounded-lg skeleton opacity-70"></div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    window.PORTAL_BOOT = { corpId: "{{ corp_id }}" };
  </script>
  <script src="{{ url_for('static', filename='dist-legacy/portal.js') }}?v={{ asset_v }}"></script>
{% endblock %}
